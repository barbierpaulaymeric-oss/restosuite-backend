<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>RestoSuite AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Navigation — Bottom bar mobile, top bar desktop -->
  <nav class="nav-bottom" id="nav">
    <div class="nav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none" height="36">
        <g transform="translate(0, 4)">
          <path d="M20 4 L36 20 L20 38 L4 20 Z" fill="#E8722A" />
          <path d="M20 4 L12 14 L20 12 L28 14 Z" fill="#1B2A4A" />
          <path d="M4 20 L12 14 L20 12 L28 14 L36 20" fill="none" stroke="#1B2A4A" stroke-width="1.5" />
        </g>
        <text x="52" y="28" font-family="Inter, sans-serif" font-weight="600" font-size="22" fill="#F7F5F2" letter-spacing="-0.5">Resto<tspan font-weight="700">Suite</tspan></text>
        <rect x="188" y="12" width="36" height="24" rx="6" fill="#E8722A" />
        <text x="206" y="29" font-family="Inter, sans-serif" font-weight="700" font-size="14" fill="#FFFFFF" text-anchor="middle">AI</text>
      </svg>
    </div>
    <div class="nav-links">
      <a href="#/" class="nav-link active" data-route="/">
        <span class="nav-icon"><i data-lucide="clipboard-list"></i></span>
        <span class="nav-label">Fiches</span>
      </a>
      <a href="#/stock" class="nav-link" data-route="/stock">
        <span class="nav-icon"><i data-lucide="warehouse"></i></span>
        <span class="nav-label">Stock</span>
      </a>
      <a href="#/haccp" class="nav-link" data-route="/haccp">
        <span class="nav-icon"><i data-lucide="shield-check"></i></span>
        <span class="nav-label">HACCP</span>
      </a>
      <a href="#/suppliers" class="nav-link" data-route="/suppliers">
        <span class="nav-icon"><i data-lucide="truck"></i></span>
        <span class="nav-label">Fournisseurs</span>
      </a>
      <a href="#/more" class="nav-link" data-route="/more">
        <span class="nav-icon"><i data-lucide="menu"></i></span>
        <span class="nav-label">Plus</span>
      </a>
    </div>
  </nav>

  <!-- Main content -->
  <main id="app"></main>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/recipe-detail.js"></script>
  <script src="js/views/recipe-form.js"></script>
  <script src="js/views/ingredients.js"></script>
  <script src="js/views/stock-dashboard.js"></script>
  <script src="js/views/stock-reception.js"></script>
  <script src="js/views/stock-movements.js"></script>
  <script src="js/views/suppliers.js"></script>
  <script src="js/views/haccp-dashboard.js"></script>
  <script src="js/views/haccp-temperatures.js"></script>
  <script src="js/views/haccp-cleaning.js"></script>
  <script src="js/views/haccp-traceability.js"></script>
  <script src="js/views/more.js"></script>
  <script src="js/views/login.js"></script>
  <script src="js/views/team.js"></script>
  <script src="js/views/subscribe.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Initialize Lucide icons after DOM load
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
