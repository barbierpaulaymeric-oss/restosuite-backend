<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RestoSuite">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <title>RestoSuite AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Loading screen (shown during cold start / slow API) -->
  <div id="loading-screen" style="display:none; position:fixed; inset:0; z-index:9999; background:#0F1923; align-items:center; justify-content:center; flex-direction:column;">
    <img src="assets/logo-outline-thin.png" alt="RestoSuite" style="height:80px; margin-bottom:24px;">
    <div style="color:#F7F5F2; font-family:Inter,sans-serif; font-size:18px; font-weight:600; margin-bottom:16px;">RestoSuite AI</div>
    <div style="width:200px; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden;">
      <div id="loading-bar" style="width:0%; height:100%; background:#E8722A; border-radius:2px; transition:width 0.5s;"></div>
    </div>
    <div style="color:#8899aa; font-size:13px; margin-top:12px;" id="loading-text">Chargement...</div>
  </div>
  <script>
  (function() {
    var screen = document.getElementById('loading-screen');
    var bar = document.getElementById('loading-bar');
    var text = document.getElementById('loading-text');
    var messages = ['Chargement...', 'Préparation de votre espace...', 'Connexion au serveur...', 'Presque prêt...'];
    var progress = 0, msgIndex = 0, shown = false;

    // Only show loading screen if server takes > 2s to respond
    var showTimer = setTimeout(function() {
      screen.style.display = 'flex';
      shown = true;
    }, 2000);

    var interval = setInterval(function() {
      progress = Math.min(progress + Math.random() * 15, 90);
      bar.style.width = progress + '%';
      if (progress > 25 * (msgIndex + 1) && msgIndex < messages.length - 1) {
        msgIndex++;
        text.textContent = messages[msgIndex];
      }
    }, 800);

    function hideScreen() {
      clearTimeout(showTimer);
      clearInterval(interval);
      if (shown) {
        bar.style.width = '100%';
        text.textContent = 'C\'est parti !';
        setTimeout(function() {
          screen.style.opacity = '0';
          screen.style.transition = 'opacity 0.3s';
          setTimeout(function() { screen.remove(); }, 300);
        }, 400);
      } else {
        screen.remove();
      }
    }

    function checkServer() {
      fetch('/api/health')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.status === 'ok') { hideScreen(); }
          else { setTimeout(checkServer, 2000); }
        })
        .catch(function() { setTimeout(checkServer, 2000); });
    }

    setTimeout(checkServer, 1000);
  })();
  </script>

  <!-- Navigation — Bottom bar mobile, top bar desktop -->
  <nav class="nav-bottom" id="nav">
    <div class="nav-brand">
      <img src="assets/logo-outline-thin.png" alt="RestoSuite" style="height: 28px; width: auto;">
    </div>
    <div class="nav-links">
      <a href="#/" class="nav-link active" data-route="/">
        <span class="nav-icon"><i data-lucide="clipboard-list"></i></span>
        <span class="nav-label">Fiches</span>
      </a>
      <a href="#/stock" class="nav-link" data-route="/stock">
        <span class="nav-icon"><i data-lucide="warehouse"></i></span>
        <span class="nav-label">Stock</span>
      </a>
      <a href="#/orders" class="nav-link" data-route="/orders">
        <span class="nav-icon"><i data-lucide="clipboard-pen"></i></span>
        <span class="nav-label">Commandes</span>
      </a>
      <a href="#/haccp" class="nav-link" data-route="/haccp">
        <span class="nav-icon"><i data-lucide="shield-check"></i></span>
        <span class="nav-label">HACCP</span>
      </a>
      <a href="#/suppliers" class="nav-link" data-route="/suppliers">
        <span class="nav-icon"><i data-lucide="truck"></i></span>
        <span class="nav-label">Fournisseurs</span>
      </a>
      <a href="#/more" class="nav-link" data-route="/more">
        <span class="nav-icon"><i data-lucide="menu"></i></span>
        <span class="nav-label">Plus</span>
      </a>
    </div>
  </nav>

  <!-- Main content -->
  <main id="app"></main>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/recipe-detail.js"></script>
  <script src="js/views/recipe-form.js"></script>
  <script src="js/views/ingredients.js"></script>
  <script src="js/views/stock-dashboard.js"></script>
  <script src="js/views/stock-reception.js"></script>
  <script src="js/views/stock-movements.js"></script>
  <script src="js/views/suppliers.js"></script>
  <script src="js/views/haccp-dashboard.js"></script>
  <script src="js/views/haccp-temperatures.js"></script>
  <script src="js/views/haccp-cleaning.js"></script>
  <script src="js/views/haccp-traceability.js"></script>
  <script src="js/views/orders.js"></script>
  <script src="js/views/service.js"></script>
  <script src="js/views/analytics.js"></script>
  <script src="js/views/more.js"></script>
  <script src="js/views/onboarding.js"></script>
  <script src="js/views/login.js"></script>
  <script src="js/views/supplier-login.js"></script>
  <script src="js/views/supplier-catalog.js"></script>
  <script src="js/views/supplier-portal-manage.js"></script>
  <script src="js/views/team.js"></script>
  <script src="js/views/subscribe.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Initialize Lucide icons after DOM load
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });
  </script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
  </script>
</body>
</html>
