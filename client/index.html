<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RestoSuite">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <title>RestoSuite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="/js/lucide.min.js"></script>
</head>
<body>
  <a href="#app" class="skip-link">Aller au contenu principal</a>

  <!-- Loading screen (shown during cold start / slow API) -->
  <div id="loading-screen" style="display:none; position:fixed; inset:0; z-index:9999; background:#0F1923; align-items:center; justify-content:center; flex-direction:column;">
    <img src="assets/logo-outline-thin.png" alt="RestoSuite" style="height:80px; margin-bottom:24px;">
    <div style="color:#F7F5F2; font-family:Inter,sans-serif; font-size:18px; font-weight:600; margin-bottom:16px;">RestoSuite</div>
    <div style="width:200px; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden;">
      <div id="loading-bar" style="width:0%; height:100%; background:#E8722A; border-radius:2px; transition:width 0.5s;"></div>
    </div>
    <div style="color:#8899aa; font-size:13px; margin-top:12px;" id="loading-text">Chargement...</div>
  </div>
  <script>
  (function() {
    var screen = document.getElementById('loading-screen');
    var bar = document.getElementById('loading-bar');
    var text = document.getElementById('loading-text');
    var messages = ['Chargement...', 'Préparation de votre espace...', 'Connexion au serveur...', 'Presque prêt...'];
    var progress = 0, msgIndex = 0, shown = false;

    // Only show loading screen if server takes > 2s to respond
    var showTimer = setTimeout(function() {
      screen.style.display = 'flex';
      shown = true;
    }, 2000);

    var interval = setInterval(function() {
      progress = Math.min(progress + Math.random() * 15, 90);
      bar.style.width = progress + '%';
      if (progress > 25 * (msgIndex + 1) && msgIndex < messages.length - 1) {
        msgIndex++;
        text.textContent = messages[msgIndex];
      }
    }, 800);

    function hideScreen() {
      clearTimeout(showTimer);
      clearInterval(interval);
      if (shown) {
        bar.style.width = '100%';
        text.textContent = 'C\'est parti !';
        setTimeout(function() {
          screen.style.opacity = '0';
          screen.style.transition = 'opacity 0.3s';
          setTimeout(function() { screen.remove(); }, 300);
        }, 400);
      } else {
        screen.remove();
      }
    }

    function checkServer() {
      fetch('/api/health')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.status === 'ok') { hideScreen(); }
          else { setTimeout(checkServer, 2000); }
        })
        .catch(function() { setTimeout(checkServer, 2000); });
    }

    setTimeout(checkServer, 1000);
  })();
  </script>

  <!-- Navigation — Bottom bar mobile, top bar desktop -->
  <nav class="nav-bottom" id="nav">
    <div class="nav-brand">
      <img src="assets/logo-outline-thin.png" alt="RestoSuite" style="height: 28px; width: auto;">
    </div>
    <div class="nav-links">
      <button class="nav-link" data-group="cuisine" data-roles="gerant,cuisinier,equipier" aria-expanded="false">
        <span class="nav-icon"><i data-lucide="utensils" aria-hidden="true"></i></span>
        <span class="nav-label">Cuisine</span>
      </button>
      <button class="nav-link" data-group="operations" data-roles="gerant,cuisinier,salle" aria-expanded="false">
        <span class="nav-icon"><i data-lucide="clipboard-pen" aria-hidden="true"></i></span>
        <span class="nav-label">Opérations</span>
      </button>
      <a href="#/haccp" class="nav-link" data-route="/haccp" data-roles="gerant,cuisinier">
        <span class="nav-icon"><i data-lucide="shield-check" aria-hidden="true"></i></span>
        <span class="nav-label">HACCP</span>
      </a>
      <button class="nav-link" data-group="pilotage" data-roles="gerant" aria-expanded="false">
        <span class="nav-icon"><i data-lucide="bar-chart-3" aria-hidden="true"></i></span>
        <span class="nav-label">Pilotage</span>
      </button>
      <a href="#/ia" class="nav-link" data-route="/ia" data-roles="gerant,cuisinier,equipier">
        <span class="nav-icon"><i data-lucide="brain" aria-hidden="true"></i></span>
        <span class="nav-label">IA</span>
      </a>
      <button class="nav-link" data-group="documents" data-roles="gerant" aria-expanded="false">
        <span class="nav-icon"><i data-lucide="file-text" aria-hidden="true"></i></span>
        <span class="nav-label">Docs</span>
      </button>
      <button class="nav-link" data-group="config" data-roles="gerant,cuisinier,equipier" aria-expanded="false">
        <span class="nav-icon"><i data-lucide="settings" aria-hidden="true"></i></span>
        <span class="nav-label">Config</span>
      </button>
      <a href="#/admin" class="nav-link" id="nav-admin-link" style="display:none">
        <span class="nav-icon"><i data-lucide="shield" aria-hidden="true"></i></span>
        <span class="nav-label">Admin</span>
      </a>
    </div>
  </nav>

  <!-- Nav Group Panel (slide-up drawer on mobile, dropdown on desktop) -->
  <div id="nav-panel" class="nav-panel">
    <div class="nav-panel-backdrop"></div>
    <div class="nav-panel-sheet" id="nav-panel-content"></div>
  </div>

  <!-- Main content -->
  <main id="app"></main>

  <!-- Toast notifications -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <script src="js/app.bundle.js"></script>
  <script>
    // Initialize Lucide icons after DOM load
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });
  </script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
  </script>
</body>
</html>
